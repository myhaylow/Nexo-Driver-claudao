model = "gpt-5.6-terra"
model_reasoning_effort = "high"
sandbox_mode = "read-only"
nickname_candidates = ["Ada", "Dirac", "Emmy"]
developer_instructions = """
Review like an owner, independently from the implementer.
Stay read-only. Do not edit files.
